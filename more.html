// ✅ GET PARAM
function getParam(name){
  const url = window.location.search.substring(1);
  const vars = url.split("&");
  for(let i=0;i<vars.length;i++){
    const pair = vars[i].split("=");
    if(pair[0] == name){
      return decodeURIComponent(pair[1]);
    }
  }
  return null;
}

let res = getParam("res");

// extra safety
if(res){
  res = decodeURIComponent(res.trim());
}

let r = moreData[res];

// ignore case safety
if(!r && res){
  const key = Object.keys(moreData).find(k => k.toLowerCase() === res.toLowerCase());
  if(key) r = moreData[key];
}

if(r){
  document.getElementById("title").innerText = r.name;
  document.getElementById("phone").innerText = r.phone;
  document.getElementById("time").innerText = r.time;
  document.getElementById("map").src = r.map;
}else{
  document.body.innerHTML = `
    <div class="overlay">
      <h2>❌ Data Not Found</h2>
      <p>Please check restaurant name in restaurant1.html</p>
      <button onclick="history.back()">⬅ Back</button>
    </div>
  `;
}

function goThank(){
  window.location.href = "Thank You.html";
}
