<!DOCTYPE html>
<html>
<head>
<title>Thank You</title>

<!-- ✅ Viewport added -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  color: white;

  background-image: url("https://res.cloudinary.com/jerrick/image/upload/d_642250b563292b35f27461a7.png,f_jpg,fl_progressive,q_auto,w_1024/6405bd4a5d4221001d8a304d.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Animated glass box */
.box {
  background: rgba(0, 0, 0, 0.6);
  padding: 40px;
  border-radius: 20px;
  width: 85%;
  max-width: 400px;
  backdrop-filter: blur(12px);
  animation: fadeIn 2s ease;
}

/* Title glow effect */
h1 {
  font-size: 36px;
  color: #FFD700;
  text-shadow: 0 0 10px gold, 0 0 20px orange;
  margin-bottom: 15px;
}

/* Text */
p {
  font-size: 16px;
  line-height: 1.6;
}

/* Button style */
a.button {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 25px;
  background: linear-gradient(45deg, orange, red);
  color: white;
  border-radius: 25px;
  text-decoration: none;
  font-size: 16px;
  transition: 0.3s;
}

/* Hover animation */
a.button:hover {
  transform: scale(1.1);
  background: linear-gradient(45deg, red, orange);
}

/* Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div class="box">
  <h1>Thank You! 🍽️</h1>

  <p>
    Thank you for using our restaurant finder.<br>
    Discover more delicious places anytime.<br>
    We are happy to serve your taste!
  </p>

  <a href="index.html" class="button">Explore Again</a>

</div>

</body>
</html>
