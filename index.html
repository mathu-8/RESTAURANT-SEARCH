<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Finder Tamil Nadu</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            background:url("https://res.cloudinary.com/jerrick/image/upload/d_642250b563292b35f27461a7.png,f_jpg,fl_progressive,q_auto,w_1024/6405bd4a5d4221001d8a304d.jpg") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 40px;
            border-radius: 15px;
            color: white;
            width: 90%;
            max-width: 500px;

            /* Fade animation */
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 28px;

            /* Moving text animation */
            animation: slideDown 2s ease-in-out;
        }

        .search-box {
            margin: 20px 0;
        }

        input {
            width: 70%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: orange;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: darkorange;
            transform: scale(1.05);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
       button {
           padding: 10px 20px;
           font-size: 16px;
           background: #ff914d;
           border: none;
           border-radius: 8px;
           cursor: pointer;
}
    </style>
</head>

<body>

    <div class="container">
        <h1>🍽️ Find Your Favorite Food in Tamil Nadu</h1>

    <a href="restaurant1.html">   
        <button>Explore Now 🚀</button>
</a>
    </div>

</body>
</html>
