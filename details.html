// 🔍 GET PARAM
function getParam(name) {
  const url = window.location.search.substring(1);
  const vars = url.split("&");

  for (let i = 0; i < vars.length; i++) {
    const pair = vars[i].split("=");
    if (pair[0] == name) {
      return decodeURIComponent(pair[1]);
    }
  }
  return null;
}

let res = getParam("res");
console.log("Selected:", res);
// 🔥 FIX: handle null + spaces
if(res){
  res = decodeURIComponent(res.trim());
}

// 🔍 DEBUG
console.log("Selected:", res);

// ✅ FIND DATA (SMART MATCH)
let data = restaurants[res];

// 🔥 EXTRA SAFETY (ignore case issues)
if(!data){
  const key = Object.keys(restaurants).find(k => k.toLowerCase() === res.toLowerCase());
  if(key) data = restaurants[key];
}

// ✅ LOAD DATA
if(data){

  document.getElementById("resName").innerText = res;
  document.getElementById("reviews").innerText = data.reviews;

  let html="";
  data.popular.forEach(item=>{
    html += `
      <div class="card">
        <img src="${item.img}">
        <p>${item.name}</p>
      </div>`;
  });

  document.getElementById("popular").innerHTML = html;
  document.getElementById("menu").innerText = data.menu.join(", ");

  document.getElementById("moreBtn").onclick = function(){
    window.location.href = "more.html?res=" + encodeURIComponent(res);
  };

}else{
  document.getElementById("resName").innerText = "❌ Data Not Found";
}

function goBack(){
  window.location.href = "restaurant1.html";
}
